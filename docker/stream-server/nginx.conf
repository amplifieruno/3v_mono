worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    server {
        listen 8888;
        server_name _;

        # CORS headers for all responses via Lua
        header_filter_by_lua_block {
            ngx.header["Access-Control-Allow-Origin"] = "*"
            ngx.header["Access-Control-Allow-Methods"] = "GET, OPTIONS"
            ngx.header["Access-Control-Allow-Headers"] = "*"
        }

        # Handle CORS preflight for all /streams/ paths
        location ~ ^/streams/.+$ {
            set $stream_id "";
            # OPTIONS preflight handled by Lua
            access_by_lua_block {
                if ngx.req.get_method() == "OPTIONS" then
                    ngx.header["Access-Control-Max-Age"] = "86400"
                    ngx.header["Content-Length"] = "0"
                    ngx.status = 204
                    ngx.exit(204)
                end
            }

            # Dispatch to specific handlers based on URI
            content_by_lua_block {
                local uri = ngx.var.uri

                -- Dynamic HLS playlist
                local stream_id = uri:match("^/streams/([^/]+)/live%.m3u8$")
                if stream_id then
                    ngx.var.stream_id = stream_id
                    dofile("/usr/local/openresty/nginx/lua/playlist.lua")
                    return
                end

                -- Synchronized snapshot
                stream_id = uri:match("^/streams/([^/]+)/snapshot%.jpg$")
                if stream_id then
                    ngx.var.stream_id = stream_id
                    dofile("/usr/local/openresty/nginx/lua/snapshot.lua")
                    return
                end

                -- Static segments (.ts files)
                local sid, seg = uri:match("^/streams/([^/]+)/segments/(.+%.ts)$")
                if sid and seg then
                    local path = "/videos/" .. sid .. "/segments/" .. seg
                    local f = io.open(path, "rb")
                    if not f then
                        ngx.status = 404
                        ngx.say("Segment not found")
                        return
                    end
                    local data = f:read("*a")
                    f:close()
                    ngx.header["Content-Type"] = "video/mp2t"
                    ngx.header["Cache-Control"] = "public, max-age=30"
                    ngx.print(data)
                    return
                end

                -- Static frames (.jpg files)
                local fid, frame = uri:match("^/streams/([^/]+)/frames/(.+%.jpg)$")
                if fid and frame then
                    local path = "/videos/" .. fid .. "/frames/" .. frame
                    local f = io.open(path, "rb")
                    if not f then
                        ngx.status = 404
                        ngx.say("Frame not found")
                        return
                    end
                    local data = f:read("*a")
                    f:close()
                    ngx.header["Content-Type"] = "image/jpeg"
                    ngx.header["Cache-Control"] = "public, max-age=1"
                    ngx.print(data)
                    return
                end

                ngx.status = 404
                ngx.say("Not found")
            }
        }

        # Health check
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
