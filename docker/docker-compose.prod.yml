services:
  # nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: itap-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - itap-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: ../
      dockerfile: apps/frontend/Dockerfile
      target: production
    container_name: itap-frontend-prod
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL:-http://backend:3001}
      VITE_WS_URL: ${VITE_WS_URL:-ws://backend:3001}
    volumes:
      - frontend_build:/app/dist
    networks:
      - itap-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ../
      dockerfile: apps/backend/Dockerfile
      target: production
    container_name: itap-backend-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      INSIGHTFACE_API_URL: ${INSIGHTFACE_API_URL}
      INSIGHTFACE_API_KEY: ${INSIGHTFACE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${BACKEND_PORT:-3001}
    depends_on:
      - postgres
      - redis
      - minio
      - insightface
    networks:
      - itap-network
    restart: unless-stopped

  # InsightFace-REST - CPU-Optimized Face Recognition Service
  insightface:
    container_name: itap-insightface-prod
    platform: linux/amd64
    build:
      context: ../libs/InsightFace-REST
      dockerfile: dockerfiles/Dockerfile_cpu
    env_file:
      - insightface-cpu.env
    environment:
      INSIGHTFACE_API_KEY: ${INSIGHTFACE_API_KEY}
    volumes:
      - ../libs/InsightFace-REST/models:/models
      - ../libs/InsightFace-REST/if_rest:/app/if_rest
      - ../libs/InsightFace-REST/entrypoint.sh:/app/entrypoint.sh
    ports:
      - "18080:18080"  # InsightFace REST API port
    networks:
      - itap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/info"]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 180s  # Longer startup time for model loading
    mem_limit: 4g  # Memory limit for production
    restart: unless-stopped

  # PostgreSQL Database with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: itap-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
      - ./backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: itap-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network
    restart: unless-stopped

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: itap-minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - itap-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  frontend_build:
    driver: local
  insightface_models:
    driver: local

networks:
  itap-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16