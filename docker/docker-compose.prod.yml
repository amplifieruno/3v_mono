version: '3.8'

services:
  # nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: itap-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - itap-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: ../
      dockerfile: apps/frontend/Dockerfile
      target: production
    container_name: itap-frontend-prod
    environment:
      NODE_ENV: production
      VITE_API_URL: http://backend:3001
      VITE_WS_URL: ws://backend:3001
    volumes:
      - frontend_build:/app/dist
    networks:
      - itap-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ../
      dockerfile: apps/backend/Dockerfile
      target: production
    container_name: itap-backend-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://itap_user:itap_password@postgres:5432/itap_prod
      REDIS_URL: redis://:redis_password@redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      COMPREFACE_API_URL: http://compreface-api:8080
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    depends_on:
      - postgres
      - redis
      - minio
      - compreface-api
    networks:
      - itap-network
    restart: unless-stopped

  # Face Recognition Service
  face-service:
    build:
      context: ../
      dockerfile: apps/face-service/Dockerfile
      target: production
    container_name: itap-face-service-prod
    environment:
      NODE_ENV: production
      COMPREFACE_API_URL: http://compreface-api:8080
      REDIS_URL: redis://:redis_password@redis:6379
      PORT: 3002
    depends_on:
      - redis
      - compreface-api
    networks:
      - itap-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: itap-postgres-prod
    environment:
      POSTGRES_DB: itap_prod
      POSTGRES_USER: itap_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itap_user -d itap_prod"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: itap-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network
    restart: unless-stopped

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: itap-minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - itap-network
    restart: unless-stopped

  # CompreFace Services
  compreface-postgres:
    image: postgres:14
    container_name: itap-compreface-postgres-prod
    environment:
      POSTGRES_DB: compreface
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: ${COMPREFACE_DB_PASSWORD}
    volumes:
      - compreface_postgres_data:/var/lib/postgresql/data
    networks:
      - itap-network
    restart: unless-stopped

  compreface-admin:
    image: exadel/compreface-admin:1.2.0
    container_name: itap-compreface-admin-prod
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/compreface
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: ${COMPREFACE_DB_PASSWORD}
      ADMIN_JAVA_OPTS: -Xmx8g
      MAX_FILE_SIZE: 5MB
      MAX_REQUEST_SIZE: 10MB
    depends_on:
      - compreface-postgres
    networks:
      - itap-network
    restart: unless-stopped

  compreface-api:
    image: exadel/compreface-api:1.2.0
    container_name: itap-compreface-api-prod
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/compreface
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: ${COMPREFACE_DB_PASSWORD}
      API_JAVA_OPTS: -Xmx8g
      SAVE_IMAGES_TO_DB: true
    depends_on:
      - compreface-postgres
    networks:
      - itap-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  compreface_postgres_data:
    driver: local
  frontend_build:
    driver: local

networks:
  itap-network:
    driver: bridge