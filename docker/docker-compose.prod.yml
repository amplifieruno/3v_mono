
networks:
  proxy:
    external: false
  internal:
    external: false

services:
  auth:
    image: nhost/hasura-auth:0.40.2
    depends_on:
      graphql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AUTH_ACCESS_CONTROL_ALLOWED_EMAIL_DOMAINS: ''
      AUTH_ACCESS_CONTROL_ALLOWED_EMAILS: ''
      AUTH_ACCESS_CONTROL_ALLOWED_REDIRECT_URLS: ''
      AUTH_ACCESS_CONTROL_BLOCKED_EMAIL_DOMAINS: ''
      AUTH_ACCESS_CONTROL_BLOCKED_EMAILS: ''
      AUTH_ACCESS_TOKEN_EXPIRES_IN: '900'
      AUTH_ANONYMOUS_USERS_ENABLED: 'false'
      AUTH_API_PREFIX: /v1
      AUTH_CLIENT_URL: http://localhost:3000
      AUTH_CONCEAL_ERRORS: 'false'
      AUTH_DISABLE_NEW_USERS: 'false'
      AUTH_DISABLE_SIGNUP: 'false'
      AUTH_EMAIL_PASSWORDLESS_ENABLED: 'false'
      AUTH_EMAIL_SIGNIN_EMAIL_VERIFIED_REQUIRED: '${AUTH_EMAIL_SIGNIN_EMAIL_VERIFIED_REQUIRED}'
      AUTH_GRAVATAR_DEFAULT: blank
      AUTH_GRAVATAR_ENABLED: 'true'
      AUTH_GRAVATAR_RATING: g
      AUTH_HOST: 0.0.0.0
      AUTH_JWT_CUSTOM_CLAIMS: '{}'
      AUTH_LOCALE_ALLOWED_LOCALES: en
      AUTH_LOCALE_DEFAULT: en
      AUTH_MFA_ENABLED: 'false'
      AUTH_MFA_TOTP_ISSUER: ''
      AUTH_OTP_EMAIL_ENABLED: 'false'
      AUTH_PASSWORD_HIBP_ENABLED: 'false'
      AUTH_PASSWORD_MIN_LENGTH: '9'
      AUTH_PORT: '4000'
      AUTH_RATE_LIMIT_BRUTE_FORCE_BURST: '10'
      AUTH_RATE_LIMIT_BRUTE_FORCE_INTERVAL: 5m
      AUTH_RATE_LIMIT_EMAIL_BURST: '10'
      AUTH_RATE_LIMIT_EMAIL_INTERVAL: 1h
      AUTH_RATE_LIMIT_EMAIL_IS_GLOBAL: 'true'
      AUTH_RATE_LIMIT_ENABLE: 'true'
      AUTH_RATE_LIMIT_GLOBAL_BURST: '100'
      AUTH_RATE_LIMIT_GLOBAL_INTERVAL: 1m
      AUTH_RATE_LIMIT_SIGNUPS_BURST: '10'
      AUTH_RATE_LIMIT_SIGNUPS_INTERVAL: 5m
      AUTH_RATE_LIMIT_SMS_BURST: '10'
      AUTH_RATE_LIMIT_SMS_INTERVAL: 1h
      AUTH_REFRESH_TOKEN_EXPIRES_IN: '2592000'
      AUTH_REQUIRE_ELEVATED_CLAIM: disabled
      AUTH_SERVER_URL: http://${AUTH_URL}/v1
      AUTH_SMTP_AUTH_METHOD: LOGIN
      AUTH_SMTP_HOST: mailhog
      AUTH_SMTP_PASS: password
      AUTH_SMTP_PORT: '1025'
      AUTH_SMTP_SECURE: 'false'
      AUTH_SMTP_SENDER: hasura-auth@example.com
      AUTH_SMTP_USER: user
      AUTH_TURNSTILE_SECRET: ''
      AUTH_USER_DEFAULT_ALLOWED_ROLES: user,me
      AUTH_USER_DEFAULT_ROLE: user
      HASURA_GRAPHQL_ADMIN_SECRET: ${GRAPHQL_ADMIN_SECRET}
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      HASURA_GRAPHQL_GRAPHQL_URL: http://graphql:8080/v1/graphql
      HASURA_GRAPHQL_JWT_SECRET: ${JWT_SECRET}
      POSTGRES_MIGRATIONS_CONNECTION: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
    extra_hosts:
      - host.docker.internal:host-gateway
      - ${AUTH_URL}:host-gateway
      - ${DB_URL}:host-gateway
      - ${FUNCTIONS_URL}:host-gateway
      - ${GRAPHQL_URL}:host-gateway
      - ${STORAGE_URL}:host-gateway
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -S
        - http://localhost:4000/healthz
      timeout: 60s
      interval: 5s
      start_period: 60s
    labels:
      traefik.enable: 'true'
      traefik.http.routers.auth.entrypoints: web
      traefik.http.routers.auth.rule: Host(`${AUTH_URL}`)
      traefik.http.routers.auth.service: auth
      traefik.http.routers.auth.tls: 'false'
      traefik.http.services.auth.loadbalancer.server.port: '4000'
    restart: always
    networks:
      - internal
      - proxy
    volumes:
      - type: bind
        source: ../apps/nhost/nhost/emails
        target: /app/email-templates
        read_only: false

  graphql:
    image: nhost/graphql-engine:v2.46.0-ce
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GRAPHITE_WEBHOOK_SECRET: ''
      HASURA_GRAPHQL_ADMIN_INTERNAL_ERRORS: 'true'
      HASURA_GRAPHQL_ADMIN_SECRET: ${GRAPHQL_ADMIN_SECRET}
      HASURA_GRAPHQL_CONSOLE_ASSETS_DIR: /srv/console-assets
      HASURA_GRAPHQL_CORS_DOMAIN: '*'
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      HASURA_GRAPHQL_DEV_MODE: 'false'
      HASURA_GRAPHQL_DISABLE_CORS: 'false'
      HASURA_GRAPHQL_ENABLE_ALLOWLIST: 'false'
      HASURA_GRAPHQL_ENABLE_CONSOLE: 'false'
      HASURA_GRAPHQL_ENABLE_REMOTE_SCHEMA_PERMISSIONS: 'false'
      HASURA_GRAPHQL_ENABLE_TELEMETRY: 'false'
      HASURA_GRAPHQL_ENABLED_APIS: metadata,graphql
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup,http-log,webhook-log,websocket-log
      HASURA_GRAPHQL_EVENTS_HTTP_POOL_SIZE: '100'
      HASURA_GRAPHQL_INFER_FUNCTION_PERMISSIONS: 'true'
      HASURA_GRAPHQL_JWT_SECRET: ${JWT_SECRET}
      HASURA_GRAPHQL_LIVE_QUERIES_MULTIPLEXED_BATCH_SIZE: '100'
      HASURA_GRAPHQL_LIVE_QUERIES_MULTIPLEXED_REFETCH_INTERVAL: '1000'
      HASURA_GRAPHQL_LOG_LEVEL: warn
      HASURA_GRAPHQL_PG_CONNECTIONS: '50'
      HASURA_GRAPHQL_PG_TIMEOUT: '180'
      HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: 'false'
      HASURA_GRAPHQL_TX_ISOLATION: read-committed
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
      HASURA_GRAPHQL_USE_PREPARED_STATEMENTS: 'true'
      HASURA_GRAPHQL_WS_READ_COOKIE: 'false'
    extra_hosts:
      - host.docker.internal:host-gateway
      - ${AUTH_URL}:host-gateway
      - ${DB_URL}:host-gateway
      - ${FUNCTIONS_URL}:host-gateway
      - ${GRAPHQL_URL}:host-gateway
      - ${STORAGE_URL}:host-gateway
    healthcheck:
      test:
        - CMD-SHELL
        - curl http://localhost:8080/healthz > /dev/null 2>&1
      timeout: 60s
      interval: 5s
      start_period: 60s
    labels:
      traefik.enable: 'true'
      traefik.http.middlewares.replace-graphql.replacepathregex.regex: /v1(/|$$)(.*)
      traefik.http.middlewares.replace-graphql.replacepathregex.replacement: /v1/graphql$$2
      traefik.http.routers.hasura.entrypoints: websecure
      traefik.http.routers.hasura.rule: Host(`${GRAPHQL_URL}`) && ( PathPrefix(`/v1`) || PathPrefix(`/v2`) || PathPrefix(`/api/`) || PathPrefix(`/console/assets`) )
      traefik.http.routers.hasura.service: hasura
      traefik.http.routers.hasura.tls: 'true'
      traefik.http.services.graphql.loadbalancer.server.port: '8080'
      traefik.http.services.hasura.loadbalancer.server.port: '8080'
      # traefik.http.routers.hasura-http.entrypoints: web
      # traefik.http.routers.hasura-http.rule: Host(`${GRAPHQL_URL}`)
      # traefik.http.routers.hasura-http.middlewares: redirect-https@file
    restart: always
    networks:
      - proxy
      - internal

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    entrypoint:
      - /bin/sh
    command:
      - -c
      - mkdir -p /data/nhost && /usr/bin/minio server --address :9000 /data
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    extra_hosts:
      - host.docker.internal:host-gateway
      - ${AUTH_URL}:host-gateway
      - ${DB_URL}:host-gateway
      - ${FUNCTIONS_URL}:host-gateway
      - ${GRAPHQL_URL}:host-gateway
      - ${STORAGE_URL}:host-gateway
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - type: volume
        source: minio
        target: /data

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_DEV_INSECURE: 'true'
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
    extra_hosts:
      - host.docker.internal:host-gateway
      - ${AUTH_URL}:host-gateway
      - ${DB_URL}:host-gateway
      - ${FUNCTIONS_URL}:host-gateway
      - ${GRAPHQL_URL}:host-gateway
      - ${STORAGE_URL}:host-gateway
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
        - -d
        - postgres
        - -q
      timeout: 60s
      interval: 5s
      start_period: 60s
    ports:
      - mode: ingress
        target: 5432
        published: '5432'
        protocol: tcp
    restart: always
    networks:
      - internal
    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data/
        read_only: false
      - type: bind
        source: ../apps/nhost/initdb.d
        target: /docker-entrypoint-initdb.d
        read_only: true

  storage:
    image: nhost/hasura-storage:0.7.2
    depends_on:
      graphql:
        condition: service_healthy
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    command:
      - serve
    environment:
      BIND: :5000
      HASURA_ENDPOINT: http://graphql:8080/v1
      HASURA_GRAPHQL_ADMIN_SECRET: ${GRAPHQL_ADMIN_SECRET}
      HASURA_METADATA: '1'
      POSTGRES_MIGRATIONS: '1'
      POSTGRES_MIGRATIONS_SOURCE: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable
      PUBLIC_URL: http://${STORAGE_URL}
      S3_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      S3_BUCKET: nhost
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ''
      S3_ROOT_FOLDER: ''
      S3_SECRET_KEY: ${STORAGE_SECRET_KEY}
    extra_hosts:
      - host.docker.internal:host-gateway
      - ${AUTH_URL}:host-gateway
      - ${DB_URL}:host-gateway
      - ${FUNCTIONS_URL}:host-gateway
      - ${GRAPHQL_URL}:host-gateway
      - ${STORAGE_URL}:host-gateway
    labels:
      traefik.enable: 'true'
      traefik.http.routers.storage.entrypoints: web
      traefik.http.routers.storage.rule: Host(`${STORAGE_URL}`) && PathPrefix(`/v1`)
      traefik.http.routers.storage.service: storage
      traefik.http.routers.storage.tls: 'false'
      traefik.http.services.storage.loadbalancer.server.port: '5000'
    restart: always
    networks:
      - internal
      - proxy

  insightface:
    container_name: itap-insightface-prod
    platform: linux/amd64
    build:
      context: ../libs/InsightFace-REST
      dockerfile: dockerfiles/Dockerfile_cpu
    env_file:
      - insightface-cpu.env
    volumes:
      - ../libs/InsightFace-REST/models:/models
      - ../libs/InsightFace-REST/if_rest:/app/if_rest
      - ../libs/InsightFace-REST/entrypoint.sh:/app/entrypoint.sh
    ports:
      - '${INSIGHTFACE_PORT}:18080'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:18080/info']
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 180s
    mem_limit: 4g
    networks:
      - internal

  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=false
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.file.directory=/opt/traefik
      - --providers.file.watch=true
      - --providers.docker.exposedbydefault=false
    networks:
      - proxy
      - internal
    ports: []
    # ports:
    #   - "80:80"
    #   - "443:443"
    extra_hosts:
      - host.docker.internal:host-gateway
      - ${AUTH_URL}:host-gateway
      - ${DB_URL}:host-gateway
      - ${FUNCTIONS_URL}:host-gateway
      - ${GRAPHQL_URL}:host-gateway
      - ${STORAGE_URL}:host-gateway
    restart: always
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
      - type: bind
        source: ../apps/nhost/traefik
        target: /opt/traefik
        read_only: true

  migrate:
    image: nhost/graphql-engine:v2.46.0-ce.cli-migrations-v3
    depends_on:
      graphql:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        hasura-cli metadata apply --endpoint=http://graphql:8080 &&
        hasura-cli migrate apply --database-name default --endpoint=http://graphql:8080
    environment:
      HASURA_GRAPHQL_ADMIN_SECRET: ${GRAPHQL_ADMIN_SECRET}
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      HASURA_GRAPHQL_JWT_SECRET: ${JWT_SECRET}
    networks:
      - internal
    restart: "no"
    volumes:
      - type: bind
        source: ../apps/nhost/nhost
        target: /app
        read_only: false
    working_dir: /app

  # nginx reverse proxy with frontend
  frontend:
    build:
      context: ../
      dockerfile: apps/frontend/Dockerfile
      target: production
    container_name: itap-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports: []
    networks:
      - internal
      - proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      traefik.enable: "true"
      traefik.http.routers.frontend.entrypoints: web
      traefik.http.routers.frontend.rule: Host(`${APP_URL}`)
      # traefik.http.routers.frontend.entrypoints: websecure
      # traefik.http.routers.frontend.rule: Host(`${APP_URL}`)
      # traefik.http.routers.frontend.tls: "true"
      # traefik.http.routers.frontend.tls.certresolver: le
      # traefik.http.routers.frontend-http.entrypoints: web
      # traefik.http.routers.frontend-http.rule: Host(`${APP_URL}`)
      # traefik.http.routers.frontend-http.middlewares: redirect-https@file

      traefik.http.services.frontend.loadbalancer.server.port: "80"

  # Backend API
  backend:
    build:
      context: ../
      dockerfile: apps/backend/Dockerfile
      target: production
    container_name: itap-backend-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      INSIGHTFACE_API_URL: ${INSIGHTFACE_API_URL}
      INSIGHTFACE_API_KEY: ${INSIGHTFACE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${BACKEND_PORT:-3001}
    depends_on:
      postgres:
        condition: service_healthy
      insightface:
        condition: service_healthy
    networks:
      - proxy
      - internal
    labels:
      traefik.enable: "true"
      traefik.http.routers.backend.entrypoints: web
      traefik.http.routers.backend.rule: Host(`${API_URL}`)
      # traefik.http.routers.backend.entrypoints: websecure
      # traefik.http.routers.backend.rule: Host(`${API_URL}`)
      # traefik.http.routers.backend.tls: "true"
      # traefik.http.routers.backend.tls.certresolver: le
      # traefik.http.routers.backend-http.entrypoints: web
      # traefik.http.routers.backend-http.rule: Host(`${API_URL}`)
      # traefik.http.routers.backend-http.middlewares: redirect-https@file

      traefik.http.services.backend.loadbalancer.server.port: ${BACKEND_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  pgdata: {}
  minio: {}
  letsencrypt: {}
