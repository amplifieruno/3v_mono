version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: itap-postgres-dev
    environment:
      POSTGRES_DB: itap_dev
      POSTGRES_USER: itap_user
      POSTGRES_PASSWORD: itap_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itap_user -d itap_dev"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: itap-redis-dev
    command: redis-server --appendonly yes --requirepass redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network

  # MinIO Object Storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: itap-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - itap-network

  # InsightFace-REST - CPU-Optimized Face Recognition Service
  insightface:
    image: bavlat/insightface-rest:v0.6.2.0
    container_name: itap-insightface
    environment:
      # CPU-оптимизированные модели - возвращаемся к рабочей конфигурации
      DET_NAME: scrfd_10g_gnkps     # Рабочая модель детекции
      REC_NAME: glintr100           # Проверенная модель распознавания  
      GA_MODEL: "None"              # Отключаем Age/Gender для скорости
      MASK_DETECTOR: "None"         # Без детекции масок
      
      # Performance settings - оптимизировано для скорости
      DEF_DET_THRESH: "0.6"         # Порог детекции
      MAX_SIZE: "1280,1280"         # Исходный размер для совместимости с моделью
      
      # API behavior settings
      DEF_RETURN_FACE_DATA: "False" # Не возвращаем сырые изображения лиц
      DEF_EXTRACT_GA: "False"       # Отключаем gender/age
      DEF_EXTRACT_EMBEDDING: "True" # Только embeddings
      
      # Batch processing - один за раз для CPU
      REC_BATCH_SIZE: "1"           # Размер батча распознавания
      DET_BATCH_SIZE: "1"           # Размер батча детекции
      
      # Backend settings
      INFERENCE_BACKEND: "onnx"     # ONNX для CPU
      FORCE_FP16: "False"           # Без FP16 на CPU
      
      # CPU Optimization - критично для производительности!
      NUM_WORKERS: "1"              # 1 воркер вместо 4 для CPU
      
      # Thread limits - избегаем конкуренции потоков
      OMP_NUM_THREADS: "4"          # OpenMP потоки
      OPENBLAS_NUM_THREADS: "4"     # OpenBLAS потоки
      MKL_NUM_THREADS: "4"          # Intel MKL потоки
      NUMEXPR_NUM_THREADS: "4"      # NumExpr потоки
      
      LOG_LEVEL: "INFO"             # Логирование
      USE_NVJPEG: "False"           # Без NVIDIA JPEG
      
    ports:
      - "18080:18080"               # InsightFace REST API port
    
    volumes:
      # Model cache for faster startup
      - insightface_models:/models
      
    networks:
      - itap-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/info"]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 180s            # Дольше для загрузки новых моделей
    
    # Resource limits (для docker-compose, не Swarm)
    mem_limit: 4g                   # Реальный лимит памяти
    # cpus: "4.0"                   # Раскомментировать при необходимости

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  insightface_models:
    driver: local

networks:
  itap-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16