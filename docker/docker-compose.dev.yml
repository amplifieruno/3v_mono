version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: itap-postgres-dev
    environment:
      POSTGRES_DB: itap_dev
      POSTGRES_USER: itap_user
      POSTGRES_PASSWORD: itap_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itap_user -d itap_dev"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: itap-redis-dev
    command: redis-server --appendonly yes --requirepass redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network

  # MinIO Object Storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: itap-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - itap-network

  # InsightFace-REST - High-performance Face Recognition Service (using community image)
  insightface:
    image: bavlat/insightface-rest:v0.6.2.0
    container_name: itap-insightface
    environment:
      # Model configuration for CPU (optimized for accuracy)
      DET_NAME: scrfd_10g_gnkps     # High accuracy detection model
      REC_NAME: glintr100           # Best recognition model (512D embeddings) 
      GA_MODEL: genderage_v1        # Age/Gender model
      MASK_DETECTOR: "None"         # No mask detection for now
      
      # Performance settings
      DEF_DET_THRESH: 0.6           # Detection threshold
      MAX_SIZE: "1280,1280"         # Max input image size (CPU optimized)
      
      # API behavior settings
      DEF_RETURN_FACE_DATA: "False" # Don't return raw face crops
      DEF_EXTRACT_GA: "True"        # Extract gender/age by default
      DEF_EXTRACT_EMBEDDING: "True" # Extract embeddings by default
      
      # Batch processing (CPU optimized)
      REC_BATCH_SIZE: 1             # Recognition batch size
      DET_BATCH_SIZE: 1             # Detection batch size
      
      # Backend settings
      INFERENCE_BACKEND: "onnx"     # Use ONNX for CPU
      FORCE_FP16: "False"           # No FP16 on CPU
      
      # Workers and logging
      NUM_WORKERS: 4                # Number of worker processes
      LOG_LEVEL: "INFO"             # Logging level
      USE_NVJPEG: "False"           # No NVIDIA JPEG acceleration
      
    ports:
      - "18080:18080"               # InsightFace REST API port
    
    volumes:
      # Model cache for faster startup
      - insightface_models:/models
      
    networks:
      - itap-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/info"]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 120s            # CPU model loading takes more time
    
    # Resource limits for CPU usage
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  insightface_models:
    driver: local

networks:
  itap-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16