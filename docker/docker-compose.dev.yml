services:
  # PostgreSQL Database with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: itap-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: itap-redis-dev
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network

  # MinIO Object Storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: itap-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"   # API
      - "${MINIO_CONSOLE_PORT}:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - itap-network

  # InsightFace-REST - CPU-Optimized Face Recognition Service
  insightface:
    container_name: itap-insightface
    platform: linux/amd64
    build:
      context: ../libs/InsightFace-REST
      dockerfile: dockerfiles/Dockerfile_cpu
    env_file:
      - insightface-cpu.env
    volumes:
      - ../libs/InsightFace-REST/models:/models
      - ../libs/InsightFace-REST/if_rest:/app/if_rest
      - ../libs/InsightFace-REST/entrypoint.sh:/app/entrypoint.sh
    ports:
      - "${INSIGHTFACE_PORT}:18080"               # InsightFace REST API port  
    networks:
      - itap-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/info"]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 180s            # Дольше для загрузки новых моделей
    
    # Resource limits (для docker-compose, не Swarm)
    mem_limit: 4g                   # Реальный лимит памяти
    # cpus: "4.0"                   # Раскомментировать при необходимости

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  insightface_models:
    driver: local

networks:
  itap-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16