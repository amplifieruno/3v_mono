version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: itap-postgres-dev
    environment:
      POSTGRES_DB: itap_dev
      POSTGRES_USER: itap_user
      POSTGRES_PASSWORD: itap_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itap_user -d itap_dev"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: itap-redis-dev
    command: redis-server --appendonly yes --requirepass redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - itap-network

  # MinIO Object Storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: itap-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - itap-network

  # CompreFace - Face Recognition Service
  compreface-postgres:
    image: postgres:14
    container_name: itap-compreface-postgres
    environment:
      POSTGRES_DB: compreface
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface_password
    volumes:
      - compreface_postgres_data:/var/lib/postgresql/data
    networks:
      - itap-network

  compreface-admin:
    image: exadel/compreface-admin:1.2.0
    container_name: itap-compreface-admin
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/compreface
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface_password
      ADMIN_JAVA_OPTS: -Xmx8g
      MAX_FILE_SIZE: 5MB
      MAX_REQUEST_SIZE: 10MB
    depends_on:
      - compreface-postgres
    ports:
      - "8080:8080"
    networks:
      - itap-network

  compreface-api:
    image: exadel/compreface-api:1.2.0
    container_name: itap-compreface-api
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/compreface
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface_password
      API_JAVA_OPTS: -Xmx8g
      SAVE_IMAGES_TO_DB: true
    depends_on:
      - compreface-postgres
    ports:
      - "8081:8080"
    networks:
      - itap-network

  compreface-fe:
    image: exadel/compreface-fe:1.2.0
    container_name: itap-compreface-fe
    environment:
      API_URL: http://compreface-api:8080
    depends_on:
      - compreface-api
      - compreface-admin
    ports:
      - "8082:80"
    networks:
      - itap-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  compreface_postgres_data:
    driver: local

networks:
  itap-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16