packages:
  - 'apps/*'
  - 'packages/*'
  - '!**/node_modules/**'
  - '!**/dist/**'
  - '!**/build/**'

# Catalogs для управления версиями зависимостей
catalog:
  # React ecosystem
  react: ^18.3.1
  react-dom: ^18.3.1
  react-types: ^18.3.17
  react-router-dom: ^7.1.1
  
  # TypeScript и инструменты
  typescript: ^5.7.2
  '@types/node': ^20.14.10
  
  # Build tools
  vite: ^6.0.7
  '@vitejs/plugin-react': ^4.3.4
  
  # Tailwind CSS v4
  tailwindcss: ^4.1.11
  '@tailwindcss/cli': ^4.1.11
  '@tailwindcss/postcss': ^4.1.11
  
  # Backend
  express: ^4.21.2
  '@types/express': ^5.0.0
  cors: ^2.8.5
  helmet: ^8.0.0
  dotenv: ^16.4.7
  
  # Database
  typeorm: ^0.3.20
  pg: ^8.13.1
  '@types/pg': ^8.11.10
  redis: ^4.7.0
  
  # Testing
  vitest: ^2.1.8
  '@testing-library/react': ^16.1.0
  '@testing-library/jest-dom': ^6.6.3
  
  # Linting
  eslint: ^9.18.0
  '@typescript-eslint/eslint-plugin': ^8.20.0
  '@typescript-eslint/parser': ^8.20.0
  
  # Utilities
  zod: ^3.24.1
  axios: ^1.7.9
  socket.io: ^4.8.1
  socket.io-client: ^4.8.1
  
  # State management
  zustand: ^5.0.2
  '@tanstack/react-query': ^5.62.7
  
  # UI Components
  '@radix-ui/react-avatar': ^1.1.1
  '@radix-ui/react-button': ^1.1.1
  '@radix-ui/react-dialog': ^1.1.2
  '@radix-ui/react-dropdown-menu': ^2.1.2
  '@radix-ui/react-icons': ^1.3.2
  'class-variance-authority': ^0.7.1
  clsx: ^2.1.1
  'tailwind-merge': ^2.6.0
  
  # Development
  nodemon: ^3.1.9
  'ts-node': ^10.9.2
  concurrently: ^9.1.0