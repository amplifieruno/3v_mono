table:
  name: detections
  schema: itap
object_relationships:
  - name: device
    using:
      foreign_key_constraint_on: device_id
  - name: identity
    using:
      foreign_key_constraint_on: identity_id
select_permissions:
  - role: staff
    permission:
      columns:
        - id
        - created_at
        - device_id
        - identity_id
        - confidence
        - similarity
        - is_new_identity
        - bbox
        - thumbnail
      filter: {}
      allow_aggregations: true
    comment: ""
insert_permissions:
  - role: staff
    permission:
      check: {}
      columns:
        - device_id
        - identity_id
        - confidence
        - similarity
        - is_new_identity
        - bbox
        - thumbnail
    comment: ""
delete_permissions:
  - role: staff
    permission:
      filter: {}
    comment: ""
