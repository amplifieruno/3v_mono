table:
  name: devices
  schema: itap
object_relationships:
  - name: area
    using:
      foreign_key_constraint_on: area_id
array_relationships:
  - name: health_metrics
    using:
      foreign_key_constraint_on:
        column: device_id
        table:
          name: device_health_metrics
          schema: itap
  - name: detections
    using:
      foreign_key_constraint_on:
        column: device_id
        table:
          name: detections
          schema: itap
insert_permissions:
  - role: staff
    permission:
      check: {}
      columns:
        - name
        - device_type
        - area_id
        - stream_url
        - credentials
        - resolution
        - fps
        - status
        - health_status
        - last_seen
        - configuration
        - recognition_enabled
        - recognition_fps
    comment: ""
select_permissions:
  - role: staff
    permission:
      columns:
        - id
        - created_at
        - updated_at
        - name
        - device_type
        - area_id
        - stream_url
        - credentials
        - resolution
        - fps
        - status
        - health_status
        - last_seen
        - configuration
        - recognition_enabled
        - recognition_fps
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: staff
    permission:
      columns:
        - name
        - device_type
        - area_id
        - stream_url
        - credentials
        - resolution
        - fps
        - status
        - health_status
        - last_seen
        - configuration
        - recognition_enabled
        - recognition_fps
      filter: {}
      check: null
    comment: ""
delete_permissions:
  - role: staff
    permission:
      filter: {}
    comment: ""
